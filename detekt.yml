    active: true
    threshold: 15
    excludes: [ '**/test/**', '**/androidTest/**' ]
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    reportMoments: [ 'Visit', 'Leave' ]
    excludes: [ '**/test/**', '**/androidTest/**' ]
  LongMethod:
    active: true
    threshold: 60
    excludes: [ '**/test/**', '**/androidTest/**' ]
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
    ignoreDefaultParameters: false
    ignoreDataClasses: true
    ignoreFunctionsWithOnlySimpleDelegate: false
    excludes: [ '**/test/**', '**/androidTest/**' ]
  NestedBlockDepth:
    active: true
    threshold: 4
    excludes: [ '**/test/**', '**/androidTest/**' ]
  StringLiteralDuplication:
    active: false
    excludes: [ '**/test/**', '**/androidTest/**' ]
    threshold: 3
    ignoreAnnotation: true
    excludeStringsWithLessThan5Characters: true
    ignoreStringsRegex: '^(TAG|DEBUG|ERROR|INFO|WARN|LOG)'
  TooManyFunctions:
    active: true
    thresholdInClasses: 11
    thresholdInInterfaces: 11
    thresholdInObjects: 11
    thresholdInEnums: 11
    ignoreDeprecated: false
    ignorePrivate: false
    ignoreOverridden: false
