build:
  maxIssues: 10
  excludeCorrectable: false
  weights:
    # Optional: severity -> max-issues count. Used to break the build when the amount of issues exceeds the maximum.
    MAJOR: 5
    MINOR: 10
    WARNING: 15

config:
  validation: true
  warningThreshold: 10
  failThreshold: 5

processors:
  active: true
  exclude:
    - 'DetektProgressListener'
  # - 'KtFileCountProcessor'
  # - 'PackageCountProcessor'
  # - 'ClassCountProcessor'
  # - 'FunctionCountProcessor'
  # - 'PropertyCountProcessor'
  # - 'ProjectComplexityProcessor'
  # - 'ProjectLinesOfCodeProcessor'
  # - 'ProjectCognitiveComplexityProcessor'
  # - 'ProjectRawMetricsProcessor'

console-reports:
  active: true
  exclude:
  # - 'ProjectStatisticsReport'
  # - 'MetricsReport'
  # - 'ComplexityReport'
  # - 'NotificationReport'
  # - 'FindingsReport'
  # - 'FileBasedFindingsReport'

output-reports:
  active: true
  exclude:
  # - 'TxtReport'
  # - 'XmlReport'
  # - 'JsonReport'
  # - 'SarifReport'
  # - 'HtmlReport'

comments:
  active: true
  excludes: [ '**/test/**', '**/androidTest/**' ]
  Commented:
