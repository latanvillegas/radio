# Gradle Daemon Configuration for Low-Memory Environments
org.gradle.jvmargs=-Xms512m -Xmx3072m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200

# Daemon configuration
org.gradle.daemon=true
org.gradle.daemon.health.scratchdir=/workspaces/Radio_Satelital/.gradle/daemon-scratchdir
org.gradle.workers.max=2
org.gradle.parallel=false

# Timeout del daemon
org.gradle.daemon.idletimeout=30000

# Build cache
org.gradle.caching=true

# Compiler
org.gradle.unsafe.isolated-projects=false
