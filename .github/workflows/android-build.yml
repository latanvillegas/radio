# GitHub Actions Workflow - Build Android Release (Signed)
#
# Compila APK release y firma automáticamente usando secretos de GitHub:
# - KEYSTORE_BASE64
# - KEY_ALIAS
# - KEY_PASSWORD

name: Build Android Release (Kotlin + Compose)

on:
  push:
    branches:
      - Radio-nativa-klotin

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate signing secrets
        run: |
          [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] || (echo "Missing secret: KEYSTORE_BASE64" && exit 1)
          [ -n "${{ secrets.KEY_ALIAS }}" ] || (echo "Missing secret: KEY_ALIAS" && exit 1)
          [ -n "${{ secrets.KEY_PASSWORD }}" ] || (echo "Missing secret: KEY_PASSWORD" && exit 1)

      - name: Setup signing configuration
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-keystore.jks
          cd android
          cat > keystore.properties << EOF
          storeFile=../android-keystore.jks
          storePassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Android Release APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -Pkeystore=true --no-daemon --info

      - name: Verify APK signature
        run: |
          SIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          test -f "$SIGNED_APK"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" verify --verbose --print-certs "$SIGNED_APK"

      - name: Secure cleanup
        if: always()
        run: |
          if [ -f android-keystore.jks ]; then
            shred -u android-keystore.jks || rm -f android-keystore.jks
          fi
          if [ -f android/keystore.properties ]; then
            shred -u android/keystore.properties || rm -f android/keystore.properties  
          fi

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioSatelital-Release-APK-Signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
          name: RadioSatelital-v9.5-Release-AAB
          path: android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: List generated files
        if: always()
        run: |
          echo "=== Build artifacts ==="
          find android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null || echo "No Android artifacts found"
