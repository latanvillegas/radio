name: Build Android Release (Kotlin + Compose)

on:
  push:
    branches:
      - Radio-nativa-klotin
  workflow_dispatch:

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Block legacy Tauri references
        run: bash scripts/verify-no-tauri.sh

      - name: Validate signing secrets
        run: |
          [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] || (echo "Missing secret: KEYSTORE_BASE64" && exit 1)
          [ -n "${{ secrets.KEY_ALIAS }}" ] || (echo "Missing secret: KEY_ALIAS" && exit 1)
          [ -n "${{ secrets.KEY_PASSWORD }}" ] || (echo "Missing secret: KEY_PASSWORD" && exit 1)

      - name: Prepare keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-keystore.jks

      - name: Build signed APK and AAB
        working-directory: ./android
        env:
          KEYSTORE_FILE: ../android-keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --info

      - name: Verify APK signature
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          test -f "$APK_PATH"
          BT_VERSION="$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)"
          "$ANDROID_SDK_ROOT/build-tools/$BT_VERSION/apksigner" verify --verbose --print-certs "$APK_PATH"

      - name: Generate SHA256 checksums
        run: |
          mkdir -p android/app/build/outputs/checksums
          find android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -print0 | \
            xargs -0 sha256sum > android/app/build/outputs/checksums/SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RadioSatelital-release-${{ github.run_number }}-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/checksums/SHA256SUMS.txt
          retention-days: 30
          if-no-files-found: error

      - name: Secure cleanup
        if: always()
        run: |
          if [ -f android-keystore.jks ]; then
            shred -u android-keystore.jks || rm -f android-keystore.jks
          fi

      - name: List generated files
        if: always()
        run: |
          echo "=== Build artifacts ==="
          find android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" -o -name "SHA256SUMS.txt" \) 2>/dev/null || echo "No Android artifacts found"
