name: Android Quality Gate

on:
  push:
    branches:
      - main
      - Radio-nativa-klotin
  pull_request:
    branches:
      - main
      - Radio-nativa-klotin

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Validate native stack policy
        run: bash scripts/verify-no-tauri.sh

      - name: Android lint
        run: bash scripts/with-java21.sh ./android/gradlew -p android lint --no-daemon

      - name: Android unit tests
        run: bash scripts/with-java21.sh ./android/gradlew -p android test --no-daemon

      - name: Android release build
        run: bash scripts/with-java21.sh ./android/gradlew -p android assembleRelease --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-quality-reports-${{ github.run_number }}
          path: |
            android/app/build/reports/**
            android/build/reports/**
          if-no-files-found: warn
