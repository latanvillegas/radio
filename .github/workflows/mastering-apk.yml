# ╔══════════════════════════════════════════════════════════════════╗
# ║   MASTERING APK — Radio Satelital  ·  Production Signing Chain  ║
# ║   Algoritmo : RSA-2048  ·  Validez : 10000 días                 ║
# ║   Esquema   : APK Signature Scheme V2 + V3  (V1 desactivado)    ║
# ║   Secrets   : KEYSTORE_BASE64 · KEY_ALIAS · KEY_PASSWORD        ║
# ╚══════════════════════════════════════════════════════════════════╝

name: "Mastering APK Radio Satelital"

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── [1] SOURCE ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── [2] JAVA / KEYTOOL ────────────────────────────────────────────
      - name: Setup Java 17 (JDK — keytool incluido)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── [3] RUST ──────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      # ── [4] ANDROID SDK + NDK ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 26.1
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Android Build-Tools 34 (zipalign + apksigner)
        run: sdkmanager --install "build-tools;34.0.0"

      # ── [5] CACHE ─────────────────────────────────────────────────────
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── [6] NODE / TAURI ──────────────────────────────────────────────
      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init

      # ── [7] COMPILACIÓN ───────────────────────────────────────────────
      - name: Build Android APK (release — sin firmar)
        run: npx tauri android build --apk

      # ══════════════════════════════════════════════════════════════════
      #  BLOQUE DE FIRMA DE PRODUCCIÓN  ·  V2 + V3  (compresión estricta)
      # ══════════════════════════════════════════════════════════════════

      # ── [8] KEYSTORE ──────────────────────────────────────────────────
      - name: Decode Production Keystore (RSA-2048 · 10000 días)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret KEYSTORE_BASE64 no encontrado. Configura el secret en GitHub."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          # Verificar integridad básica del keystore
          keytool -list \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "${{ secrets.KEY_PASSWORD }}" \
            -noprompt
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      # ── [9] LOCALIZAR APK ────────────────────────────────────────────
      - name: Locate unsigned APK
        run: |
          APK_UNSIGNED=$(find android/app/build/outputs/apk/release \
            -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_UNSIGNED" ]; then
            echo "::error::No se encontró ningún APK en el directorio de salida."
            exit 1
          fi
          echo "APK_UNSIGNED=$APK_UNSIGNED"                                        >> $GITHUB_ENV
          echo "APK_ALIGNED=$RUNNER_TEMP/app-release-aligned.apk"                 >> $GITHUB_ENV
          echo "APK_SIGNED=$RUNNER_TEMP/RadioSatelital-v9.5-release-signed.apk"   >> $GITHUB_ENV
          echo "APKSIGNER=$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"          >> $GITHUB_ENV
          echo "ZIPALIGN=$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign"            >> $GITHUB_ENV

      # ── [10] ZIPALIGN ─────────────────────────────────────────────────
      - name: Zipalign APK (alineación 4 bytes)
        run: |
          "$ZIPALIGN" -v -p 4 "$APK_UNSIGNED" "$APK_ALIGNED"

      # ── [11] FIRMA V2/V3 ──────────────────────────────────────────────
      - name: Sign APK — Esquema V2 + V3 (V1 desactivado)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          "$APKSIGNER" sign \
            --ks              "$KEYSTORE_PATH" \
            --ks-key-alias    "$KEY_ALIAS" \
            --ks-pass         "pass:$KEY_PASSWORD" \
            --key-pass        "pass:$KEY_PASSWORD" \
            --v1-signing-enabled false \
            --v2-signing-enabled true  \
            --v3-signing-enabled true  \
            --out             "$APK_SIGNED" \
            "$APK_ALIGNED"

      # ── [12] VERIFICACIÓN FINAL (15 kHz Air EQ — Google Play Console) ─
      - name: Verify APK signature — V2/V3 compliance + certificate fingerprint
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  VERIFICACIÓN DE FIRMA  ·  APK Signature Scheme V2/V3"
          echo "══════════════════════════════════════════════════════"
          "$APKSIGNER" verify --verbose --print-certs "$APK_SIGNED"
          echo ""
          echo "── Fingerprint SHA-256 del certificado ──"
          keytool -printcert -jarfile "$APK_SIGNED" 2>/dev/null \
            | grep -E "SHA.*:|Owner:|Issuer:|Validity|Serial" \
            || true
          echo ""
          echo "✅ Firma V2/V3 verificada. APK listo para Google Play Console."

      # ── [13] LIMPIEZA SEGURA DEL KEYSTORE ────────────────────────────
      - name: Secure keystore cleanup
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/release.keystore" ]; then
            shred -u "$RUNNER_TEMP/release.keystore" 2>/dev/null \
              || rm -f "$RUNNER_TEMP/release.keystore"
          fi

      # ── [14] ARTIFACT ─────────────────────────────────────────────────
      - name: Export Master Artifact (APK firmado V2/V3)
        uses: actions/upload-artifact@v4
        with:
          name: RadioSatelital-v9.5-Release-APK-Signed
          path: ${{ runner.temp }}/RadioSatelital-v9.5-release-signed.apk
          if-no-files-found: error
          retention-days: 90
