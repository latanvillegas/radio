<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; form-action 'self'">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>Radio Offline</title>
    <style>
        body { margin: 0; padding: 0; background: #05070a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #888; margin-bottom: 2rem; }
        button { background: #d32f2f; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Sin Conexión</h1>
    <p>Comprueba tu internet para seguir escuchando.</p>
    <button onclick="window.location.reload()">Reconectar</button>
</body>
</html>
